services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/check-db-connection.sh:/check-db-connection.sh
      - pg_data:/var/lib/postgresql
  tool:
    build:
      context: docker/tool
    environment:
      GOCACHE: /go-cache
    volumes:
      - ./decision-maker:/workspace
      - ./tmp/.go/pkg:/go/pkg
      - ./tmp/.go-cache:/go-cache
      - ./api:/api
      - ./db:/db
    env_file:
      - .env
volumes:
  pg_data:
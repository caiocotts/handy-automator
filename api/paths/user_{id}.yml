delete:
  summary: Delete user by ID
  operationId: deleteUser
  description: Delete the user matching the given ID.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: User ID
      required: true
      schema:
        type: string
  responses:
    '204':
      description: User record successfully deleted
    '404':
      $ref: ../components/responses/NotFound.yml

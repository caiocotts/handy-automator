post:
  summary: Register new user
  operationId: createUser
  description: Register a new user onto the system. Usernames must be unique!
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              type: string
              description: User name
              example: caiocotts
            password:
              type: string
              description: The user's password
              example: password123
          required:
            - username
            - password
  responses:
    '201':
      description: User registered successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yml
    '400':
      $ref: ../components/responses/BadRequest.yml

put:
  summary: Associate devices to a workflow
  operationId: associateWorkflowDevices
  description: Associate new devices to a workflow. The request body should contain all devices which should be part of the workflow matching the given id. You may also use this endpoint for removing devices from the workflow, by simply ommiting them from the request body. That is to say, if a workflow contains devices 1, 2, and 3, by using this endpoint with only devices 1 and 3, the workflow will now contain only devices 1 and 3.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          properties:
            devices:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Device ID
                    example: pXkHij_kJjXh
                required:
                  - id
          required:
            - devices
  responses:
    '200':
      description: Device associated to workflow successfully
      content:
        application/json:
          schema:
            properties:
              devices:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Device ID
                      example: pXkHij_kJjXh
                  required:
                    - id
    '400':
      $ref: ../components/responses/BadRequest.yml
    '404':
      $ref: ../components/responses/NotFound.yml

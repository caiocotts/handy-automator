get:
  summary: Get device by ID
  operationId: getDevice
  description: Get information relating to the device matching the given ID.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Device ID
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Device record successfully retrieved
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Device.yml
    '404':
      $ref: ../components/responses/NotFound.yml
delete:
  summary: Delete device by ID
  operationId: deleteDevice
  description: Delete the device matching the given ID.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Device ID
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Device record successfully deleted
    '404':
      $ref: ../components/responses/NotFound.yml

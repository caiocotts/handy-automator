post:
  summary: Trigger a workflow
  operationId: triggerWorkflow
  description: Trigger the workflow corresponding to the given hand gesture, for the currently authenticated user.
  security:
    - accessToken: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            gestureId:
              type: integer
              description: Gesture ID
              example: 2
          required:
            - gestureId
  responses:
    '207':
      description: Per-device trigger results
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/DeviceTriggerStatus.yml
    '401':
      $ref: ../components/responses/NotAuthorized.yml
    '404':
      $ref: ../components/responses/NotFound.yml
    '500':
      $ref: ../components/responses/InternalServerError.yml

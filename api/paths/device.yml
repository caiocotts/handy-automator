get:
  summary: Get all devices
  operationId: getDevices
  description: Get a list of all edge devices on the network.
  security:
    - accessToken: [ ]
  responses:
    '200':
      description: Device records successfully retrieved
      content:
        application/json:
          schema:
            type: object
            properties:
              devices:
                $ref: ../components/schemas/DeviceList.yml
post:
  summary: Create a device
  operationId: createDevice
  description: Register a new device onto the system. (This should be used by edge devices who wish to publish their IPs)
  security:
    - accessToken: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            ip:
              type: string
              description: Device IP
              example: 192.168.1.18
          required:
            - ip
  responses:
    '201':
      description: Device record successfully created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Device.yml
    '400':
      $ref: ../components/responses/BadRequest.yml

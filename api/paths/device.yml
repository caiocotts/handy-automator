get:
  summary: Get all devices
  operationId: getDevices
  description: Get a list of all edge devices on the network.
  security:
    - accessToken: [ ]
  responses:
    '200':
      description: Device records successfully retrieved
      content:
        application/json:
          schema:
            type: object
            properties:
              devices:
                $ref: ../components/schemas/DeviceList.yml
    '500':
      $ref: ../components/responses/InternalServerError.yml

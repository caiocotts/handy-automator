get:
  summary: Get workflow by ID
  operationId: getWorkflow
  description: Get information relating to the workflow matching the given ID.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Workflow record successfully retrieved
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Workflow.yml
    '404':
      $ref: ../components/responses/NotFound.yml
delete:
  summary: Delete workflow by ID
  operationId: deleteWorkflow
  description: Delete the workflow matching the given ID.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Workflow record successfully deleted
    '404':
      $ref: ../components/responses/NotFound.yml
patch:
  summary: Update workflow
  operationId: updateWorkflow
  description: Update workflow information. For adding devices to the workflow see <a href=#operation/associateWorkflowDevices>associateWorkflowDevices</a>.
  security:
    - accessToken: [ ]
  parameters:
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
              description: Workflow name
              example: Turn on bedroom lights
  responses:
    '200':
      description: Workflow record successfully updated
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Workflow.yml
    '400':
      $ref: ../components/responses/BadRequest.yml
    '404':
      $ref: ../components/responses/NotFound.yml

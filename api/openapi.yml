openapi: 3.0.0
info:
  title: Decision Maker API
  description: Decision Maker API
  version: 0.0.1
servers:
  - url: /api
paths:
  /ping:
    $ref: paths/ping.yml
  /user:
    $ref: paths/user.yml
  /user/{id}:
    $ref: paths/user_{id}.yml
  /auth/login:
    $ref: paths/auth_login.yml
  /auth/login/face:
    $ref: paths/auth_login_face.yml
  /auth/refresh:
    $ref: paths/auth_refresh.yml
  /device:
    $ref: paths/device.yml
  /device/{id}:
    $ref: paths/device_{id}.yml
  /workflow:
    $ref: paths/workflow.yml
  /workflow/trigger:
    $ref: paths/workflow_trigger.yml
  /workflow/{id}:
    $ref: paths/workflow_{id}.yml
  /workflow/{id}/devices:
    $ref: paths/workflow_{id}_devices.yml
components:
  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: An access JWT token
    refreshToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: A refresh JWT token

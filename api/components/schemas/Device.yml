type: object
properties:
  id:
    type: string
    description: Device ID
    example: pXkHij_kJjXh
  hostname:
    type: string
    description: Device mDNS hostname
    example: handy-1a2b3c.local
  name:
    type: string
    description: Device name
    example: Bedroom lamp
  type:
    type: string
    description: Device type
    example: Light
required:
  - id
  - hostname

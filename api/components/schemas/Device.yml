type: object
properties:
  id:
    type: string
    description: Device ID
    example: pXkHij_kJjXh
  ip:
    type: string
    description: Device IP
    example: 192.168.1.18
  name:
    type: string
    description: Device name
    example: Bedroom lamp
  type:
    type: string
    description: Device type
    example: Light
required:
  - id
  - ip
